<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi página</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f0f2f5;
    }

    .pantalla-acceso {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      z-index: 10;
    }

    .recuadro-codigo {
      width: min(280px, 85vw);
      padding: 18px;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .recuadro-codigo h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .recuadro-codigo input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #c8c8c8;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .recuadro-codigo button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2f6fed;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .mensaje-estado {
      margin: 10px 0 0;
      font-size: 0.85rem;
      min-height: 1em;
    }

    .mensaje-estado.error {
      color: #d12d2d;
    }

    .mensaje-estado.exito {
      color: #1c9b3b;
    }

    .contenido {
      display: none;
      padding: 40px 20px;
      text-align: center;
    }

    .contenido.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="pantalla-acceso" id="pantallaAcceso">
    <div class="recuadro-codigo">
      <h2>Ingresa el código de acceso</h2>
      <input id="codigoInput" type="password" placeholder="Código de 4 dígitos" maxlength="4" inputmode="numeric" />
      <button id="btnAcceder" type="button">Acceder</button>
      <p id="mensajeEstado" class="mensaje-estado"></p>
    </div>
  </div>

  <main id="contenido" class="contenido" aria-hidden="true">
    <h1>Bienvenido</h1>
    <p>Has ingresado correctamente a la página principal.</p>
  </main>

  <script>
    const CODIGOS_VALIDOS = {
      administrador: "2303",
      usuario: "2868",
    };
    const pantallaAcceso = document.getElementById("pantallaAcceso");
    const codigoInput = document.getElementById("codigoInput");
    const btnAcceder = document.getElementById("btnAcceder");
    const mensajeEstado = document.getElementById("mensajeEstado");
    const contenido = document.getElementById("contenido");

    function mostrarMensaje(texto, tipo) {
      mensajeEstado.textContent = texto;
      mensajeEstado.className = `mensaje-estado ${tipo}`;
    }

    function abrirPaginaPrincipal() {
      pantallaAcceso.style.display = "none";
      contenido.classList.add("visible");
      contenido.setAttribute("aria-hidden", "false");
    }

    function validarCodigo() {
      const codigoIngresado = codigoInput.value.trim();
      const esCodigoValido = Object.values(CODIGOS_VALIDOS).includes(codigoIngresado);

      if (esCodigoValido) {
        mostrarMensaje("Ingreso exitoso", "exito");
        setTimeout(abrirPaginaPrincipal, 900);
      } else {
        mostrarMensaje("Código incorrecto. Intenta de nuevo.", "error");
      }
    }

    btnAcceder.addEventListener("click", validarCodigo);
    codigoInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        validarCodigo();
      }
    });
  </script>
</body>
</html>
