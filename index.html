<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi página</title>
  <style>
    @font-face {
      font-family: "BALQIS";
      src: local("BALQIS"), local("Balqis");
      font-display: swap;
    }

    :root {
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f0f2f5;
    }

    .pantalla-acceso {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      z-index: 10;
    }

    .recuadro-codigo {
      width: min(280px, 85vw);
      padding: 18px;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .recuadro-codigo h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .recuadro-codigo input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #c8c8c8;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .recuadro-codigo button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2f6fed;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .mensaje-estado {
      margin: 10px 0 0;
      font-size: 0.85rem;
      min-height: 1em;
    }

    .mensaje-estado.error {
      color: #d12d2d;
    }

    .mensaje-estado.exito {
      color: #1c9b3b;
    }

    .contenido {
      display: none;
      padding: 40px 20px;
      text-align: center;
      min-height: 100vh;
      box-sizing: border-box;
      background: #ffffff;
    }

    .contenido.contenido-usuario {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .bienvenida-usuario {
      margin: 0;
      font-family: "BALQIS", "Lucida Calligraphy", cursive;
      font-size: clamp(2rem, 5vw, 3.6rem);
      letter-spacing: 0.02em;
      color: #181818;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .descripcion-bienvenida {
      margin: 0;
      max-width: min(700px, 90vw);
      text-align: center;
      color: #2a2a2a;
      font-family: Calibri, "Trebuchet MS", sans-serif;
      font-size: clamp(1rem, 2.1vw, 1.25rem);
      line-height: 1.7;
    }

    .linea-descripcion {
      display: block;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 650ms ease, transform 650ms ease;
    }

    .mostrar {
      opacity: 1;
      transform: translateY(0);
    }

    .contenido.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="pantalla-acceso" id="pantallaAcceso">
    <div class="recuadro-codigo">
      <h2>Ingresa el código de acceso</h2>
      <input id="codigoInput" type="password" placeholder="Código de 4 dígitos" maxlength="4" inputmode="numeric" />
      <button id="btnAcceder" type="button">Acceder</button>
      <p id="mensajeEstado" class="mensaje-estado"></p>
    </div>
  </div>

  <main id="contenido" class="contenido" aria-hidden="true">
    <h1 id="tituloPrincipal">Bienvenido</h1>
    <p id="descripcionPrincipal">Has ingresado correctamente a la página principal.</p>
  </main>

  <script>
    const CODIGOS_VALIDOS = {
      administrador: "2303",
      usuario: "2868",
    };
    const pantallaAcceso = document.getElementById("pantallaAcceso");
    const codigoInput = document.getElementById("codigoInput");
    const btnAcceder = document.getElementById("btnAcceder");
    const mensajeEstado = document.getElementById("mensajeEstado");
    const contenido = document.getElementById("contenido");
    const tituloPrincipal = document.getElementById("tituloPrincipal");
    const descripcionPrincipal = document.getElementById("descripcionPrincipal");

    function mostrarMensaje(texto, tipo) {
      mensajeEstado.textContent = texto;
      mensajeEstado.className = `mensaje-estado ${tipo}`;
    }

    function abrirPaginaPrincipal(tipoUsuario) {
      pantallaAcceso.style.display = "none";
      contenido.classList.add("visible");
      contenido.setAttribute("aria-hidden", "false");

      if (tipoUsuario === "usuario") {
        document.title = "Inicio de usuario";
        contenido.classList.add("contenido-usuario");

        tituloPrincipal.textContent = "Bienvenida, Mishell Valencia";
        tituloPrincipal.className = "bienvenida-usuario";

        descripcionPrincipal.className = "descripcion-bienvenida";
        descripcionPrincipal.innerHTML = [
          "Dios te bendiga, mi querida y amada mujer,",
          "dueña de mi corazón. Hice esta página para ti",
          "con mucho amor y cariño, con el objetivo de",
          "mantener recuerdos de los dos para nosotros",
          "y para nuestros hijos. ¡Disfruta!",
        ]
          .map((linea, indice) => `<span class=\"linea-descripcion\" style=\"transition-delay:${450 + indice * 180}ms\">${linea}</span>`)
          .join("");

        requestAnimationFrame(() => {
          tituloPrincipal.classList.add("mostrar");
          descripcionPrincipal.querySelectorAll(".linea-descripcion").forEach((linea) => {
            linea.classList.add("mostrar");
          });
        });
      }
    }

    function validarCodigo() {
      const codigoIngresado = codigoInput.value.trim();
      const tipoUsuario = Object.keys(CODIGOS_VALIDOS).find(
        (tipo) => CODIGOS_VALIDOS[tipo] === codigoIngresado
      );

      if (tipoUsuario) {
        mostrarMensaje("Ingreso exitoso", "exito");
        setTimeout(() => abrirPaginaPrincipal(tipoUsuario), 900);
      } else {
        mostrarMensaje("Código incorrecto. Intenta de nuevo.", "error");
      }
    }

    btnAcceder.addEventListener("click", validarCodigo);
    codigoInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        validarCodigo();
      }
    });
  </script>
</body>
</html>
